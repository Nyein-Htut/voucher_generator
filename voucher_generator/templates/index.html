<!DOCTYPE html>
<html>
<head>
    <title>Memory Cake Voucher</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            min-height: 100vh;
        }

        .voucher-card {
            border-radius: 16px;
            border: none;
        }

        .brand-header {
            font-weight: 700;
            letter-spacing: 2px;
        }

        .sub-text {
            font-size: 0.9rem;
            color: #6c757d;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #495057;
            margin-top: 15px;
        }

        .total-box {
            background: #212529;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
        }

        .btn-primary-custom {
            background: #f6f3f3;
            border: none;
            padding: 12px;
            font-weight: 600;
        }

        .btn-primary-custom:hover {
            background: #c6c1c1;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center py-5">

    <div class="card shadow-lg p-4 voucher-card" style="max-width: 520px; width: 100%;">

        <div class="text-center mb-3">
            <h3 class="brand-header">MEMORY CAKE</h3>
            <div class="sub-text">Voucher Generator / 订单生成系统</div>
        </div>

        <form action="/generate" method="POST">

            <div class="section-title">Customer Info</div>
            <div class="mb-3">
                <input type="text" name="customer" class="form-control form-control-lg"
                       placeholder="Customer / 客户姓名" required>
            </div>

            <div class="section-title">Order Details</div>

            <div class="mb-3">
                <input type="text" name="item" class="form-control"
                       placeholder="Cake Name / 蛋糕名称" required>
            </div>

            <div class="row">

    <div class="col-6 mb-3">
        <label class="form-label">Quantity / 数量</label>
        <input type="number" name="qty" value="1" class="form-control"
               required>
    </div>

    <div class="col-6 mb-3">
        <label class="form-label">Price (MMK)</label>
        <input type="number" name="price" class="form-control"
               required>
    </div>

</div>

<div class="mb-3">
    <label class="form-label">Delivery Fee / 车费</label>
    <input type="number" name="delivery" value="0" class="form-control"
           required>
</div>

            <div class="total-box mb-3">
                Estimated Total: Auto Calculated in JPG
            </div>

            <button class="btn btn-primary-custom w-100">
                Generate Voucher JPG
            </button>

        </form>

    </div>

</div>

</body>
</html>
