<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Cake Voucher</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            min-height: 100vh;
        }
        .voucher-card {
            border-radius: 16px;
            border: none;
        }
        .brand-header {
            font-weight: 700;
            letter-spacing: 2px;
        }
        .sub-text {
            font-size: 0.9rem;
            color: #6c757d;
        }
        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #495057;
            margin-top: 15px;
        }
        .total-box {
            background: #212529;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
        }
        .btn-primary-custom {
            background: #f6f3f3;
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-primary-custom:hover {
            background: #c6c1c1;
        }
        .preview-img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center py-5">
    <div class="card shadow-lg p-4 voucher-card" style="max-width: 650px; width: 100%;">
        <div class="text-center mb-3">
            <h3 class="brand-header">MEMORY CAKE</h3>
            <div class="sub-text">Voucher Generator / 订单生成系统</div>
        </div>

        <form id="voucherForm">
            <div class="section-title">Customer Info</div>
            <div class="mb-3">
                <input type="text" name="customer" class="form-control form-control-lg"
                       placeholder="Customer / 客户姓名" required>
            </div>

            <div class="section-title d-flex justify-content-between align-items-center mb-2">
                <span>Order Details</span>
                <button type="button" class="btn btn-sm btn-dark" onclick="addItemRow()">+ Add Item</button>
            </div>

            <div id="items-container">
                <div class="item-row border p-2 mb-2 rounded bg-light">
                    <div class="mb-2">
                        <input type="text" name="item[]" class="form-control form-control-sm" placeholder="Item Name / 商品名称" required>
                    </div>
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="small text-muted m-0">Quantity / 数量</label>
                            <input type="number" name="qty[]" value="1" class="form-control form-control-sm" required>
                        </div>
                        <div class="col-6">
                            <label class="small text-muted m-0">Price (MMK)</label>
                            <input type="number" name="price[]" class="form-control form-control-sm" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-3 mt-3">
                <label class="form-label font-weight-bold">Delivery Fee / 车费</label>
                <input type="number" name="delivery" value="0" class="form-control" required>
            </div>

            <div class="total-box mb-3">
                Estimated Total: Auto Calculated in JPG
            </div>

            <button type="submit" class="btn btn-primary-custom w-100">
                Generate Voucher JPG
            </button>
        </form>
    </div>
</div>

<div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Voucher Preview / 凭证预览</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center bg-light">
                <p class="text-muted small mb-3">You can take a screenshot or use the download button below.</p>
                <img id="voucherPreviewImage" src="" alt="Voucher Preview" class="preview-img mb-3">
                <div class="d-flex justify-content-center gap-2">
                    <a id="downloadButton" href="#" download="voucher.jpg" class="btn btn-success px-4 py-2">
                        <i class="bi bi-download me-2"></i> Download Voucher
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
function addItemRow() {
    const container = document.getElementById('items-container');
    const newRow = document.createElement('div');
    newRow.className = 'item-row border p-2 mb-2 rounded bg-light';
    newRow.innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-2">
            <input type="text" name="item[]" class="form-control form-control-sm me-2" placeholder="Item Name / 商品名称" required>
            <button type="button" class="btn btn-sm btn-danger remove-btn" onclick="this.closest('.item-row').remove()">✕</button>
        </div>
        <div class="row g-2">
            <div class="col-6">
                <label class="small text-muted m-0">Quantity / 数量</label>
                <input type="number" name="qty[]" value="1" class="form-control form-control-sm" required>
            </div>
            <div class="col-6">
                <label class="small text-muted m-0">Price (MMK)</label>
                <input type="number" name="price[]" class="form-control form-control-sm" required>
            </div>
        </div>
    `;
    container.appendChild(newRow);
}

document.getElementById('voucherForm').addEventListener('submit', function(e) {
    e.preventDefault(); // Freezes the default page change process
    
    const formData = new FormData(this);
    
    fetch('/generate', {
        method: 'POST',
        body: formData
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Server returned HTTP Error Status ' + response.status);
        }
        return response.json();
    })
    .then(data => {
        if (data.success) {
            document.getElementById('voucherPreviewImage').src = data.file_url;
            document.getElementById('downloadButton').href = data.file_url;
            
            const modalEl = document.getElementById('previewModal');
            const previewModal = new bootstrap.Modal(modalEl);
            previewModal.show();
        } else {
            alert("Error: " + (data.error || "Could not generate voucher layout image."));
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert("Server communication dropped. Please review your hosting application log streams.");
    });
});
</script>

</body>
</html>
