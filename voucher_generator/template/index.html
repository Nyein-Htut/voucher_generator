<!DOCTYPE html>
<html>
<head>

    <title>Memory Cake Voucher</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            MEMORY CAKE
        </h2>

        <form action="/generate" method="POST">

            <div class="mb-3">
                <label>Customer / 客户</label>
                <input type="text"
                       name="customer"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Cake Name / 蛋糕名称</label>
                <input type="text"
                       name="item"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Quantity / 数量</label>
                <input type="number"
                       name="qty"
                       value="1"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Price (MMK)</label>
                <input type="number"
                       name="price"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Delivery Fee / 车费</label>
                <input type="number"
                       name="delivery"
                       value="0"
                       class="form-control"
                       required>
            </div>

            <button class="btn btn-dark w-100">
                Generate Voucher JPG
            </button>

        </form>

    </div>

</div>

</body>
</html>
